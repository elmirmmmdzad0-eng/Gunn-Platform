gemini.api.key=${GEMINI_API_KEY:}
pexels.api.key=${PEXELS_API_KEY:}

# TripGen public backend URL. Render deploy-dan sonra bunu real URL ile evez edin.
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Gmail SMTP ayarlari:
# Gmail ucun adi hesab parolu yox, Google Account -> App Password yaradib GMAIL_APP_PASSWORD kimi saxlayin.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# Database ayarlari:
# Lokal test ucun default H2 qalir. Render-de PostgreSQL ucun SPRING_DATASOURCE_URL yazmaq kifayetdir.
# Eger Render yalniz DATABASE_URL=postgresql://user:pass@host/db verirse, DatabaseUrlEnvironmentPostProcessor onu avtomatik JDBC formata cevirir.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:tripgen}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:sa}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.open-in-view=false
