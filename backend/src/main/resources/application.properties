gemini.api.key=${GEMINI_API_KEY}

# TripGen public backend URL. Render deploy-dan sonra bunu real URL ile evez edin.
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Gmail SMTP ayarlari:
# Gmail ucun adi hesab parolu yox, Google Account -> App Password yaradib GMAIL_APP_PASSWORD kimi saxlayin.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# Development ucun sadə H2 database. Production-da bunu PostgreSQL/MySQL ile evez etmek daha dogrudur.
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:tripgen}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
