<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripGen - Ağıllı Səyahət Köməkçisi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 650px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            color: #1e3c72;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
            font-size: 1rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2a5298;
        }
        input[type="text"], select {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }
        input[type="text"]:focus, select :focus {
            border-color: #1e3c72;
            box-shadow: 0 0 10px rgba(30, 60, 114, 0.2);
        }
        .btn {
            display: width;
            width: 100%;
            background: #1e3c72;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s ease;
        }
        .btn:hover {
            background: #2a5298;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .result-card {
            margin-top: 30px;
            padding: 25px;
            background: #f8fafc;
            border-left: 6px solid #1e3c72;
            border-radius: 12px;
            display: none;
            animation: fadeIn 0.5s ease-in-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
        }
        .result-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .result-item h3 {
            font-size: 0.95rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .result-item p {
            font-size: 1.1rem;
            color: #1e293b;
            font-weight: 500;
            line-height: 1.5;
        }
        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
            font-weight: 600;
            color: #1e3c72;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>TripGen 🌍</h1>
        <p>Statusunuza özəl, süni intellekt dəstəkli fərdi səyahət planı.</p>
    </div>

    <div class="form-group">
        <label for="cityInput">Gedəcəyiniz Şəhər:</label>
        <input type="text" id="cityInput" placeholder="Məsələn: Paris, Tokyo, Roma...">
    </div>

    <div class="form-group">
        <label for="statusSelect">Səyahətçi Statusunuz:</label>
        <select id="statusSelect">
            <option value="student">Tələbə (Büdcəli və Sərfəli) 🎓</option>
            <option value="worker">İşgüzar / Solo Səyahətçi 💼</option>
            <option value="couple">Cütlük / Romantik Səyahət 👩&zwj;❤️&zwj;👨</option>
        </select>
    </div>

    <button class="btn" onclick="analyzeTrip()">Fərdi Planı Hazırla</button>

    <div class="loader" id="loader">Süni İntellekt analiz edir, zəhmət olmasa gözləyin... 🧠</div>

    <div class="result-card" id="resultCard">
        <div class="result-item">
            <h3>📍 Şəhər</h3>
            <p id="resCity">-</p>
        </div>
        <div class="result-item">
            <h3>🏨 Statusunuza Uyğun Otel</h3>
            <p id="resHotel">-</p>
        </div>
        <div class="result-item">
            <h3>🪪 Viza Statusu (Azərb. Vətəndaşları üçün)</h3>
            <p id="resVisa">-</p>
        </div>
        <div class="result-item">
            <h3>✈️ Təyyarə Bileti (Təxmini Qiymət)</h3>
            <p id="resTicket">-</p>
        </div>
        <div class="result-item">
            <h3>💡 Ağıllı Səyahət Fəndləri (Hacks)</h3>
            <p id="resHacks">-</p>
        </div>
    </div>
</div>

<script>
    function analyzeTrip() {
        const city = document.getElementById('cityInput').value.trim();
        const status = document.getElementById('statusSelect').value;
        const loader = document.getElementById('loader');
        const resultCard = document.getElementById('resultCard');

        if (!city) {
            alert('Zəhmət olmasa bir şəhər adı daxil edin.');
            return;
        }

        loader.style.display = 'block';
        resultCard.style.display = 'none';

        // Həm şəhəri, həm də seçilən statusu Backend-ə göndəririk!
        fetch(`/api/destinations/analyze?city=${encodeURIComponent(city)}&status=${status}`)
            .then(response => response.json())
            .then(data => {
                loader.style.display = 'none';
                resultCard.style.display = 'block';

                document.getElementById('resCity').innerText = data.city || city;
                document.getElementById('resHotel').innerText = data.hotel || 'Məlumat tapılmadı';
                document.getElementById('resVisa').innerText = data.visa || 'Məlumat tapılmadı';
                document.getElementById('resTicket').innerText = data.ticket || 'Məlumat tapılmadı';
                document.getElementById('resHacks').innerText = data.hacks || 'Məlumat tapılmadı';
            })
            .catch(error => {
                loader.style.display = 'none';
                alert('Sistemdə xəta baş verdi. Terminalı yoxlayın.');
                console.error(error);
            });
    }
</script>
</body>
</html>
